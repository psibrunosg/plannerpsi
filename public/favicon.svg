<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="128" fill="#0a0a0f"/>
  <defs>
    <linearGradient id="bs-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" /> <!-- purple-400 -->
      <stop offset="100%" stop-color="#7c3aed" /> <!-- purple-600 -->
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <text x="50%" y="54%" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="220" fill="url(#bs-gradient)" text-anchor="middle" dominant-baseline="middle" letter-spacing="-8" filter="url(#glow)">
    BS
  </text>
  
  <circle cx="400" cy="400" r="20" fill="#a855f7" filter="url(#glow)"/>
</svg>